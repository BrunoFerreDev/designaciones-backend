spring.application.name=webdesignaciones
# ==========================================
# CONFIGURACIÓN DEL DATASOURCE (SQLite)
# ==========================================
#spring.datasource.url=jdbc:sqlite:mibasededatos.sqlite
#spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:postgresql://localhost:5432/designaciones
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=develop
spring.datasource.password=develop123
# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# Dialecto nativo de SQLite para Hibernate 6 (Spring Boot 3+)
spring.jpa.hibernate.ddl-auto=update
# Mostrar las consultas SQL en la consola (opcional, muy útil para debuggear)
spring.jpa.properties.hibernate.format_sql=true
# ==========================================
# CONFIGURACIÓN DE CORS
# ==========================================
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.exposed-headers=Authorization,Content-Type
cors.allow-credentials=true
cors.max-age=3600
#Swagger
springdoc.api-docs.path=/api-docs
# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true
server.error.include-message=always
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
# Oculta cualquier ruta que comience con /rest
springdoc.paths-to-exclude=/rest/**
# Evita que SpringDoc documente las apis autogeneradas por Spring Data REST
springdoc.show-data-rest=false
spring.data.rest.base-path=/rest
# Si tienes un context-path global:
server.servlet.context-path=/api

